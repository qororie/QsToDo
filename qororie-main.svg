<?xml version="1.0" encoding="UTF-8"?>
<svg width="316.18" height="265.92" version="1.1" viewBox="-15 -15 316.18 265.92"
     xml:space="preserve"
     xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink">

  <style>
    @keyframes blink {
      0%, 96%, 100% { transform: scaleY(1); }
      98% { transform: scaleY(0.1); }
    }
    .blink-eye {
      transform-origin: center;
      transform-box: fill-box;
      animation: blink 8s infinite;
    }
    @keyframes shrug {
      0%, 96%, 100% { transform: translateY(0); }
      98% { transform: translateY(-5px); }
    }
    .shrug-left {
      transform-origin: center;
      transform-box: fill-box;
      animation: shrug 8s infinite;
    }
    @keyframes shrug-down {
      0%, 96%, 100% { transform: translateY(0); }
      98% { transform: translateY(3px); }
    }
    .shrug-right {
      transform-origin: center;
      transform-box: fill-box;
      animation: shrug-down 8s infinite;
    }
    @keyframes tiptoe {
      0%, 96%, 100% { transform: scale(1, 1) translateY(0); }
      98% { transform: scale(0.95, 1.15) translateY(-2px); }
    }
    .tiptoe-foot {
      transform-origin: top center;
      transform-box: fill-box;
      animation: tiptoe 8s infinite;
    }
    @keyframes close-mouth {
      0%, 96%, 100% { transform: scaleY(1); }
      98% { transform: scaleY(0.7); }
    }
    .mouth-anim {
      transform-origin: center;
      transform-box: fill-box;
      animation: close-mouth 8s infinite;
    }
    @keyframes sway-antenna {
      0%, 100% { transform: rotate(-10deg); }
      50% { transform: rotate(10deg); }
    }
    .antenna-anim {
      transform-origin: bottom center;
      transform-box: fill-box;
      animation: sway-antenna 4s ease-in-out infinite;
    }
    @keyframes look-pupil {
      0%, 20%, 100% { transform: translateX(0); }
      30%, 50% { transform: translateX(12px); }
      60%, 75% { transform: translateX(6px) translateY(2px); }
      85%, 95% { transform: translateX(-4px); }
    }
    @keyframes look-white-r {
      0%, 20%, 100% { transform: translateY(0); }
      30%, 50% { transform: translateY(-4px); }
      60%, 75% { transform: translateY(-1px); }
      85%, 95% { transform: translateY(1px); }
    }
    @keyframes look-white-l {
      0%, 20%, 100% { transform: translateY(0); }
      30%, 50% { transform: translateY(4px); }
      60%, 75% { transform: translateY(1px); }
      85%, 95% { transform: translateY(-1px); }
    }
    .pupil-anim {
      transform-origin: center;
      transform-box: fill-box;
      animation: look-pupil 24s ease-in-out infinite;
    }
    .white-r-anim {
      transform-origin: center;
      transform-box: fill-box;
      animation: look-white-r 24s ease-in-out infinite;
    }
    .white-l-anim {
      transform-origin: center;
      transform-box: fill-box;
      animation: look-white-l 24s ease-in-out infinite;
    }
  </style>

