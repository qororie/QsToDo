<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">

  <!-- PWAのためにService Worker を登録する -->
  <script>
    // Service Worker に対応しているブラウザかどうか確認する
    if ('serviceWorker' in navigator) {
      // ページが読み込まれたあとに登録する
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(() => {
            console.log('Service Worker Registration successful！')
          })
          .catch(err => {
            console.log('Service Worker Registration failed:', err)
          })
      })
    }
  </script>

  <!-- Androidの一部の端末では initial-scale=1.0 だけでは正しくスケールされないことがあるためminimumとmaximumも設定 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0">
  
  <title>QsToDo</title>
    <!-- ファビコン設定 -->
    <link rel="icon" href="icon.svg" type="image/svg+xml" />

    <!-- PWA設定ファイルの読み込み -->
    <link rel="manifest" href="./manifest.json">

    <!-- iOSのホーム画面追加用の設定 -->
    <!-- apple-mobile-web-app-capable → iOSでアプリっぽく動かす -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <!-- apple-mobile-web-app-status-bar-style → ステータスバーの色 -->
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <!-- apple-mobile-web-app-title → ホーム画面のアイコン下の名前 -->
    <meta name="apple-mobile-web-app-title" content="ToDo">
    <!-- apple-touch-icon → iOSのホーム画面アイコン -->
    <link rel="apple-touch-icon" href="./icon.png">
      
    <!-- Material Symbols フォントの読み込み -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    />

  <style>
    /* Material Symbolsアイコンの基本スタイル */
    .material-symbols-outlined {
      font-size: 20px;              /* アイコンサイズ */
      vertical-align: middle;       /* テキストと上下中央を揃える */
      line-height: 1;
      user-select: none;            /* アイコン文字が選択されないようにする */
      /* アイコンの見た目を細かく制御 */
      font-variation-settings:      
        "FILL" 0,   /* 0 = アウトライン, 1 = 塗りつぶし */
        "wght" 400, /* 太さ */
        "GRAD" 0,   /* グラデーション */
        "opsz" 20;  /* 最適表示サイズ */
    }

  /* =============================================
  配色
  ============================================= */
  :root {
    --a: #F23A30;
    --b: #FAFAFA;
    --d: #56a09b;
    --e: #71752B;
    --f: #191919;
    --g: #F5F2E4;
  }
    /* =============================================
       リセット・基本設定
       ============================================= */

    * { box-sizing: border-box; }
    body { background: var(--g); margin: 0; }

    /* padding-top はVueで動的に変えるのでCSSからは消す */
    .container {
      max-width: 1000px;
      margin: 0 auto;
      /* padding-top: 140px; ← この行を消す！ */
      padding: 0 16px 90px;  /* 上の余白だけ消す */
      font-family: sans-serif;
    }

    /* =============================================
       上部固定エリア
       ============================================= */

    .top-fixed {
      position: fixed;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 1000px;
      background: var(--g);
      padding: 12px 16px 8px;
      border-bottom: 2px solid var(--e);
      backdrop-filter: blur(8px);
      z-index: 100;
    }

    /* 更新・言語切替と入出力ボタンを1行に */
    .top-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    /* 更新・言語切替（左側） */

    /* 更新ボタンのアイコンサイズ */
    .reload-icon {
      width: 18px;   /* ← この数字を変えてサイズ調整 */
      height: 18px;
      display: block;
    }

    /* ボタン自体の余白を小さくする */
    .reload-btn {
      padding: 2px 4px;
    }
    

    .lang-switch { display: flex; gap: 8px; }

    /* 入出力ボタン（右側） */
    .io-bar { display: flex; gap: 8px; }

    /* 言語・入出力ボタン共通スタイル */
    .lang-switch button,
    .io-btn {
      background: transparent;
      color: var(--e);
      border: 1px solid var(--e);
      padding: 3px 8px;
      border-radius: 10px;
      font-size: 11px;
      cursor: pointer;
    }

    /* 取込ボタンを囲ってるlabelをio-btnと同じ見た目にする
    　（ファイル選択画面がブラウザセキュリティで出ないことがある対応としてlabel導入） */
    .io-import-label {
      cursor: pointer;
    }

    .lang-switch button:hover,
    .io-btn:hover { color: var(--f); border-color: var(--f); }

    /* 言語選択中のボタン */
    .lang-switch button.active {
      background: var(--e);
      color: var(--g);
      border-color: var(--e);
    }

    /* 検索欄と＋ボタンを横に並べる行 */
    .top-row {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 4px;
    }

    /* 検索・追加兼用の入力欄 */
    .search-input {
      flex: 1;
      padding: 10px 12px;
      border: 1px solid var(--e);
      border-radius: 10px;
      font-size: 15px;
      background: var(--g);
      outline: none;
    }
    .search-input.searching {
      border-color: var(--e);
      background: var(--g);
    }
    .search-input:focus { border-color: var(--f); }
    .search-input.searching:focus { border-color: var(--e); }

    /* ＋と×を切り替えるボタン */
    .toggle-btn {
      width: 42px;
      height: 42px;
      border-radius: 10px;
      border: none;
      background: var(--a);
      color: var(--g);
      font-size: 20px;
      cursor: pointer;
      flex-shrink: 0;
      padding: 0;
    }
    .toggle-btn.open { background: var(--e); }

    /* 件数表示 */
    .search-status {
      font-size: 11px;
      color: var(--g);
      margin-bottom: 4px;
      padding-left: 2px;
    }
    .search-status.is-searching { color: var(--a); }


    /* =============================================
       タスク追加フォーム
       ============================================= */

    .input-area {
      background: #fff;
      border: 1px solid var(--e);
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* 期日ラベルと入力欄を横並びにする */
    .date-row { display: flex; align-items: center; gap: 8px; }
    .date-label { font-size: 13px; color: var(--e); flex-shrink: 0; }
    .date-row input { flex: 1; width: auto; }

    /* カテゴリ候補のドロップダウン */
    .category-input-active {
      border-color: var(--e) !important;
      border-bottom-left-radius: 0 !important;
      border-bottom-right-radius: 0 !important;
      border-bottom: none !important;
    }
    .category-dropdown-label {
      font-size: 11px;
      color: var(--f);
      padding: 5px 12px 4px;
      background: var(--g);
      border: 1px solid var(--e);
    }
    .category-dropdown {
      background: (--g);
      border: 1px solid var(--e);
      border-top: none;
      border-bottom-left-radius: 10px;
      border-bottom-right-radius: 10px;
      overflow: hidden;
      margin-bottom: 4px;
    }
    .category-option {
      padding: 10px 12px;
      font-size: 14px;
      cursor: pointer;
      border-bottom: 2px solid var(--e);
      color: var(--e);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .category-option:last-child { border-bottom: none; }
    .category-option:hover { background: var(--g); }


    /* =============================================
       ボタン・入力欄の共通スタイル
       ============================================= */

    /* タスク入力欄（textarea） */
    .todo-textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--e);
      border-radius: 10px;
      font-size: 15px;
      background: var(--b);
      outline: none;
      /* 縦方向だけリサイズ可能にする.iPhoneでは縦リサイズきかない。 */
      resize: vertical;
      /* フォントをページと合わせる */
      font-family: sans-serif;
      /* 最小の高さ */
      min-height: 44px;
      line-height: 1.5;
    }

    /* :not([type="checkbox"]) → チェックボックスには適用しない */
    input:not([type="checkbox"]) {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--e);
      border-radius: 10px;
      font-size: 15px;
      background: var(--b);
      outline: none;
    }
    input:focus { border-color: var(--f); }

    /* チェックボックスにチェックが入ったときの色 */
    .cb {
      accent-color: var(--a);
    }


    button {
      padding: 10px 16px;
      border: 1px solid var(--d);
      border-color: var(--e);
      border-radius: 10px;
      font-size: 13px;
      cursor: pointer;
      color: var(--f);
      background-color: var(--b);
      /* 最小の高さと幅 */
      min-height: 28px;
      min-width: 28px;
      /* 最大の高さと幅 */
      max-height： 36px
      max-width: 120px;
    }
    button:active { opacity: 0.7; }

    /* ボタンを横並びにする共通クラス */
    .btn-row { 
      display: flex;           /* ボタンを均等な幅に広げる */
      gap: 8px;                /* ボタンの間隔 */
      justify-content: center; /* 中央寄せ */
    } 
  .btn-row button {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;   /* アイコン上・テキスト下（全ボタン共通） */
    gap: 2px;                 /* アイコンとテキストの間隔は2px（狭めでOK） */
    padding: 6px 4px;
    font-size: 11px;          /* 小サイズ */
    max-width: 120px;         /* PCで広がりすぎない */
  }

    /* btn-row 内のアイコンサイズ */
    .btn-row .material-symbols-outlined {
      font-size: 20px;
    }

    /* 色別ボタン */
    .cancel-btn { color: var(--e) !important; }
    .delete-btn { color: var(--a) !important; }
    .copy-btn   { color: var(--d) !important; }

    /* 追加ボタン：一番重要なので目立たせる */
    .add-btn {
      flex: 2;                  /* 戻るボタンの2倍の幅 */
      background: var(--e);     /* 濃い緑背景 */
      color: var(--b);          /* 白文字 */
      border-color: var(--e);   /* 枠も濃い緑 */
    }

    /* 追加フォームの戻るボタン */
    .cancel-add-btn {
      flex: 1;                  /* 普通サイズ */
      background: var(--g);     /* クリーム背景 */
      color: var(--e);          /* 濃い緑文字 */
      border-color: var(--e);   /* 枠も濃い緑 */
    }

    /* =============================================
       ToDoカード
       ============================================= */
    /* 期限切れてないToDoカード */
    .todo-card {
      background: var(--g);
      border:1px solid var(--e);
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 8px;
      cursor: pointer;
    }
    /* 期限切れカードは枠を赤にする */
    .todo-card.overdue {
      border-color: var(--a); 
    }
    /* 完了済みカードは枠を薄くする（期限切れより優先される） */
    .todo-card.done {
      border-color: var(--e);
      opacity: 0.4; /* 薄くして目立たせない */
    }
    /* 編集中のカードは枠をつける */
    .todo-card.editing {
      border: 1px solid var(--e);
      cursor: default;
    }

    /* カード内の横並びレイアウト */
    .card-row {
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }

    /* カード左側（チェックボックス＋テキスト） */
    .card-left {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      flex: 1;
      min-width: 0;
    }

    /* カード右側（編集・削除・コピーボタン） */
    .card-right {
      display: flex;  /* ← ボタンを横並びにする */
      gap: 4px; /* ← 幅が狭くても縮まないようにする */
      flex-shrink: 0;
    }
 
    /* カード右側のボタン共通 */
    .card-right button {
      padding: 4px 6px;
      /* アイコンと同じ行の高さに揃える */
      line-height: 1;
      /* ボタン内のアイコンを中央揃えにする */
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      color: var(--g);
    }

    .card-right button:first-child {
      color: var(--f);
    }

    /* カード右側のアイコンサイズ調整 */
    /* .card-right の中の .material-symbols-outlined だけに適用する */
    .card-right .material-symbols-outlined {
      font-size: 14px;
    }

    /* タスクのテキスト＋タグエリア（横並び・折り返しあり） */
    .todo-text-area {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
    }

    /* タスクの標準文字装飾 */
    .todo-main-text {
      font-size: 15px;
      color: var(--f);
      word-break: break-word;
      line-height: 1.4;
    }
     /* 完了タスクの標準文字装飾 */
    .todo-main-text.done {
      text-decoration: line-through;
      color: var(--e);
    }
    /* 期限切れのカードのテキストの文字色 */
    .todo-card.overdue .todo-main-text {
      color: var(--a);
    }
    /* 期限切れ＋完了済みは完了の文字色 */
    .todo-card.overdue.done .todo-main-text {
      color: var(--e);
    }

    /* カテゴリ・期日のタグエリア */
    .todo-tags {
      font-size: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-left: 6px;
    }

    .tag {
      display: inline-block;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
    }
    .tag-category { background: var(--e); color: var(--g); }
    .tag-date     { background: var(--d); color: var(--g); }
    .tag-date.overdue { background: var(--a); color: var(--g); }

    /* 編集モードの縦並びレイアウト */
    .edit-inputs {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* 編集モードのボタンだけアイコン上・テキスト下のレイアウトにする */
    .edit-inputs .btn-row button {
      flex-direction: column; /* アイコンとテキストを縦並びにする */
      gap: 2px;
      padding: 6px 4px;
      font-size: 10px;
    }

    /* 編集モードのアイコンサイズ */
    .edit-inputs .btn-row .material-symbols-outlined {
      font-size: 20px;
    }

    /* 更新ボタン：一番重要なので目立たせる */
    .edit-inputs .btn-row button:first-child {
      flex: 2;
      background: var(--e);
      color: var(--b);
      border-color: var(--e);
    }

    /* 戻るボタン */
    .edit-inputs .btn-row .cancel-btn {
      flex: 1.5;
      background: var(--g);     /* クリーム背景 */
      color: var(--e);          /* 濃い緑文字 */
      border-color: var(--e);   /* 枠も濃い緑 */
    }

    /* 削除ボタン */
    .edit-inputs .btn-row .delete-btn {
      flex: 1.5;
      background: var(--g);     /* クリーム背景 */
      color: var(--a);          /* 赤文字 */
      border-color: var(--a);   /* 枠も赤 */
    }

    /* コピーボタン：補助機能なので小さめ */
    .edit-inputs .btn-row .copy-btn {
      flex: 1;
      background: var(--g);     /* クリーム背景 */
      color: var(--d);          /* 青緑文字 */
      border-color: var(--d);   /* 枠も青緑 */
    }

    /* =============================================
       カード追加・削除のフェードアニメーション(VUEの機能で実装)
    ============================================= */

    .todo-fade-enter-active {
      transition: opacity 0.3s; /* 追加時：0.3秒でふわっと出る */
    }
    .todo-fade-leave-active {
      transition: opacity 0.3s; /* 削除時：0.3秒でふわっと消える */
    }
    .todo-fade-enter-from,
    .todo-fade-leave-to {
      opacity: 0; /* 開始・終了時は透明 */
    }

    /* =============================================
       グループ表示
       ============================================= */

    .group-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 4px 8px;
      cursor: pointer;
      border-bottom: 1.5px solid var(--e);
      margin-top: 12px;
      margin-bottom: 8px;
    }
    .group-header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .group-title { font-size: 14px; font-weight: bold; color: var(--e); }
    .group-count { font-size: 12px; color: var(--e); margin-left: 6px; }
    .group-arrow { font-size: 12px; color: var(--e); transition: transform 0.2s; }
    .group-arrow.closed { transform: rotate(-90deg); }


    /* =============================================
       下部固定エリア
       ============================================= */

    .bottom-bar {
      position: fixed;
      bottom: 0;
      left: 50%;                      /* 左端を中央に */
      transform: translateX(-50%);    /* 中央寄せ */
      width: 100%;                    /* 横幅いっぱい */
      max-width: 1000px;              /* 上部と同じ最大幅 */
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px 16px 16px;
      background: var(--g);
      border-top: 2px solid var(--e);
      backdrop-filter: blur(8px);
      gap: 10px;
    }
    .bottom-label {
      font-size: 10px;
      color: var(--e);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .bottom-buttons { display: flex; gap: 6px; }
    .bottom-bar button {
      padding: 6px 14px;
      border-radius: 10px;
      border: 1px solid var(--e);
      background: var(--g);
      color: var(--e);
      font-size: 13px;
    }
    .bottom-bar button.active {
      background: var(--a);
      color: var(--b);
      border-color: var(--a);
    }


    /* =============================================
       トースト通知
       ============================================= */

    .toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--f);
      color: #fff;
      padding: 10px 20px;
      border-radius: 10px;
      font-size: 14px;
      white-space: nowrap;
      z-index: 1000;
      opacity: 1;
      transition: opacity 0.4s;
    }
    .toast.toast-hide { opacity: 0; }

  /* 普段はメッセージを隠しておく */
  .rotate-message { display: none; }

  /* スマホ横向きのときだけ */
  @media (orientation: landscape) and (max-height: 500px) {
    /* アプリを隠す */
    #app { display: none; }
    /* メッセージを表示する */
    .rotate-message {
      display: flex;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      background: var(--G);
      font-family: sans-serif;
      font-size: 16px;
      color: var(--e);
      text-align: center;
      padding: 24px;
    }
    .rotate-message .rotate-icon { font-size: 48px; }
  }
  </style>
</head>

<body>

  <!-- 横向きのときに表示するメッセージ（#appの外に置く） -->
  <div class="rotate-message">
    <div class="rotate-icon">📱</div>
  <!-- 日本語と英語を両方ベタ書きする -->
  <div>縦向きでご利用ください</div>
  <div style="font-size:13px; color:#aaa;">Please use in portrait mode</div>
  </div>

  <!-- ══════════════════════════════════════
  #app
  　└── .container（padding-topを動的に管理
        　├── .top-fixed（上部固定）
        　├── .input-area（追加フォーム・v-ifで表示制御）
        　├── v-if="groupBy === 'none'"（一覧モード）
        　├── v-else（グループモード）
        　├── .toast（トースト通知）
        　└── .bottom-bar（下部固定）
  ══════════════════════════════════════ -->
  <div id="app">

    <!-- ↓ padding-top をVueで動的に変える（ヘッダーの高さ + 余白12px）-->
    <div class="container" :style="{ paddingTop: (topHeight + 12) + 'px' }">

      <!-- ══════════════════════════════════════
          上部固定エリア（スクロールしても常に上に固定）
          ══════════════════════════════════════ -->
      <div class="top-fixed">

        <!-- 言語切替（左）・入出力ボタン（右）を1行に -->
        <div class="top-actions">

          <!-- 言語切替･更新(キャッシュ)ボタン -->
          <div class="lang-switch">
            <button type="button" class="io-btn" @click="reloadApp">
              <img src="./icon.svg" alt="更新" class="reload-icon">
            </button>
            <button type="button" @click="currentLang = 'ja'" :class="{ active: currentLang === 'ja' }">ja</button>

// =============================================
// CSV1行をパース（分解）する関数
// "値1","値,2",値3 のようなCSVを正しく分割する
// ※ "" で囲まれた値の中のカンマは区切りとして扱わない
// appより先に定義しておく（importFromCSVから呼ばれるため）
// =============================================
function parseCSVLine(line) {
  const result = []
  let current = ''
  let inQuotes = false

  for (let i = 0; i < line.length; i++) {
    const char = line[i]
    if (char === '"') {
      // "" は " 1文字として扱う（エスケープ）
      if (inQuotes && line[i + 1] === '"') {
        current += '"'
        i++
      } else {
        inQuotes = !inQuotes
      }
    } else if (char === ',' && !inQuotes) {
      // クォートの外のカンマは区切り
      result.push(current)
      current = ''
    } else {
      current += char
    }
  }
  result.push(current)
  return result
}

// =============================================
// 様々な日付形式を yyyy-mm-dd に統一する関数
// 対応形式：
//   yyyy-mm-dd（元の形式）
//   yyyy/m/d, yyyy/mm/dd
//   m/d/yyyy（英語Excel）
//   yyyy年m月d日
// =============================================    
function normalizeDate(str) {
  if (!str || !str.trim()) return ''
  const s = str.trim()

  // すでに yyyy-mm-dd 形式ならそのまま返す
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s

  let y, m, d

  // yyyy/m/d または yyyy/mm/dd
  const slashYMD = s.split('/')
  if (slashYMD.length === 3 && slashYMD[0].length === 4) {
    y = parseInt(slashYMD[0])
    m = parseInt(slashYMD[1])
    d = parseInt(slashYMD[2])
  }

  // m/d/yyyy（英語Excel形式）
  else if (slashYMD.length === 3 && slashYMD[2].length === 4) {
    m = parseInt(slashYMD[0])
    d = parseInt(slashYMD[1])
    y = parseInt(slashYMD[2])
  }

  // yyyy年m月d日
  else {
    const kanji = s.replace('年', '/').replace('月', '/').replace('日', '').split('/')
    if (kanji.length === 3 && kanji[0].length === 4) {
      y = parseInt(kanji[0])
      m = parseInt(kanji[1])
      d = parseInt(kanji[2])
    }
  }

  // 年月日が取れなかったら空文字を返す
  if (!y || !m || !d) return ''

  // 日付として有効かチェック（例：2月30日などを弾く）
  const date = new Date(y, m - 1, d)
  if (
    date.getFullYear() !== y ||
    date.getMonth() + 1 !== m ||
    date.getDate() !== d
  ) return ''

  // yyyy-mm-dd 形式に整える（月・日を2桁にする）
  return `${y}-${String(m).padStart(2, '0')}-${String(d).padStart(2, '0')}`
}

    filteredCategories() {
      if (!this.category.trim()) return this.allCategories
      const q = this.category.toLowerCase()
      return this.allCategories.filter(cat =>
        cat.toLowerCase().includes(q) && cat !== this.category
      )
    },

      const todo = this.todos.find(t => t.id === this.editingId)
      if (!todo) return []
      if (!todo.category.trim()) return this.allCategories
      const q = todo.category.toLowerCase()
      return this.allCategories.filter(cat =>
        cat.toLowerCase().includes(q) && cat !== todo.category
      )

      const deadline = this.parseDeadline(q)
      if (deadline) {
        return this.todos.filter(todo => this.isBeforeDeadline(todo.dueDate, deadline))
      }
      return this.todos.filter(todo => {
        const text = this.toHankaku(todo.text.toLowerCase())
        const cat  = this.toHankaku((todo.category || '').toLowerCase())
        return text.includes(q) || cat.includes(q)
      })
    },

    sortedTodos() {

        a.createdAt > b.createdAt ? -1 : 1  // 新しい順

          if (!map[key]) map[key] = []
          map[key].push(todo)
        })
        return Object.keys(map)
          .map(label => ({ label, todos: map[label] }))
          .sort((a, b) => {
            if (a.label === this.t.noCategory) return 1
            if (b.label === this.t.noCategory) return -1
            return a.label.localeCompare(b.label)

              const bDate = b.dueDate || '9999-99-99'

              // 期日が違うなら期日が早い順（文字列比較でOK。yyyy-mm-dd形式のため）
              if (aDate !== bDate) return aDate > bDate ? 1 : -1

              // 期日が同じなら登録が古い順（createdAt で比較）
              return a.createdAt > b.createdAt ? 1 : -1
          })
    }))
}
      if (this.groupBy === 'dueDate') {
        const map = {}
        todos.forEach(todo => {
          const key = todo.dueDate ? this.formatDate(todo.dueDate) : this.t.noDate
          if (!map[key]) map[key] = []
          map[key].push(todo)
        })
        return Object.keys(map)
          .map(label => ({ label, todos: map[label] }))
          .sort((a, b) => {
            if (a.label === this.t.noDate) return 1
            if (b.label === this.t.noDate) return -1
            return a.todos[0].dueDate > b.todos[0].dueDate ? 1 : -1
          })
          // グループ内を「カテゴリ名前順 → 登録が古い順」に並べる
          .map(group => ({
            label: group.label,
            todos: group.todos.slice().sort((a, b) => {
              // カテゴリなしは一番後ろにする
              const aCat = a.category || 'ｿ' // 'ｿ' は五十音の最後のほうの文字
              const bCat = b.category || 'ｿ'

              // カテゴリが違うならカテゴリ名前順
              if (aCat !== bCat) return aCat.localeCompare(bCat)

              // カテゴリが同じなら登録が古い順
              return a.createdAt > b.createdAt ? 1 : -1
            })
          }))
      }
      return []
    }

  // ── 検索 ──

    // 検索欄に「今日」「来週」などと入力したとき締切日として解釈する
    parseDeadline(q) {
      const today = new Date()
      today.setHours(0, 0, 0, 0)
      const nextSunday = w => {
        const d = today.getDay()
        const diff = d === 0 ? 7 : 7 - d
        const r = new Date(today)
        r.setDate(today.getDate() + diff + w * 7)
        return r
      }
      const monthEnd = n => new Date(today.getFullYear(), today.getMonth() + 1 + n, 0)
      const youbiMap = {
        '日':0,'月':1,'火':2,'水':3,'木':4,'金':5,'土':6,
        '日曜':0,'月曜':1,'火曜':2,'水曜':3,'木曜':4,'金曜':5,'土曜':6,
        '日曜日':0,'月曜日':1,'火曜日':2,'水曜日':3,'木曜日':4,'金曜日':5,'土曜日':6,
        'sun':0,'mon':1,'tue':2,'wed':3,'thu':4,'fri':5,'sat':6,
        'sunday':0,'monday':1,'tuesday':2,'wednesday':3,
        'thursday':4,'friday':5,'saturday':6
      }
      const specificMonthMap = {
        '1月':1,'2月':2,'3月':3,'4月':4,'5月':5,'6月':6,
        '7月':7,'8月':8,'9月':9,'10月':10,'11月':11,'12月':12,
        'jan':1,'feb':2,'mar':3,'apr':4,'may':5,'jun':6,
        'jul':7,'aug':8,'sep':9,'oct':10,'nov':11,'dec':12,
        'january':1,'february':2,'march':3,'april':4,
        'june':6,'july':7,'august':8,'september':9,
        'october':10,'november':11,'december':12
      }
      const relDayMap = {
        '今日':0,'today':0,'明日':1,'あした':1,'tomorrow':1,
        '明後日':2,'あさって':2,'day after tomorrow':2
      }
      const relWeekMap = {
        '今週':nextSunday(0),'this week':nextSunday(0),
        '来週':nextSunday(1),'next week':nextSunday(1),
        '再来週':nextSunday(2),'week after next':nextSunday(2)
      }
      const relMonthMap = {
        '今月':monthEnd(0),'this month':monthEnd(0),
        '来月':monthEnd(1),'next month':monthEnd(1),
        '再来月':monthEnd(2),'month after next':monthEnd(2)
      }
      if (q in relDayMap) {
        const r = new Date(today)
        r.setDate(today.getDate() + relDayMap[q])
        return r
      }
      if (q in relWeekMap) return relWeekMap[q]
      if (q in relMonthMap) return relMonthMap[q]
      if (q in youbiMap) {
        const diff = ((youbiMap[q] - today.getDay()) + 7) % 7 || 7
        const r = new Date(today)
        r.setDate(today.getDate() + diff)
        return r
      }
      if (q in specificMonthMap) {
        const m = specificMonthMap[q]
        const y = m < today.getMonth() + 1 ? today.getFullYear() + 1 : today.getFullYear()
        return new Date(y, m, 0)
      }
      const sm = q.match(/^(\d{1,2})\/$/)
      if (sm) {
        const m = parseInt(sm[1])
        if (m >= 1 && m <= 12) {
          const y = m < today.getMonth() + 1 ? today.getFullYear() + 1 : today.getFullYear()
          return new Date(y, m, 0)
        }
      }
      return null
    },

    isBeforeDeadline(dueDate, deadline) {
      if (!dueDate) return true
      const [y, m, d] = dueDate.split('-').map(Number)
      const due = new Date(y, m - 1, d)
      due.setHours(0, 0, 0, 0)
      return due <= deadline
    },

    // ファイルをダウンロードさせる共通関数
    // content: ファイルの中身
    // filename: 保存するファイル名
    // type: ファイルの種類（'text/csv' か 'application/json'）
    downloadFile(content, filename, type) {
      // Blob → データのかたまりを作る
      const blob = new Blob([content], { type })
      // URL.createObjectURL → Blobに一時的なURLを割り当てる
      const url = URL.createObjectURL(blob)
      // 見えないリンクを作って自動クリックでダウンロード
      const a = document.createElement('a')
      a.href = url
      a.download = filename
      a.click()
      // 使い終わったURLを解放する（メモリの掃除）
      URL.revokeObjectURL(url)
    },

    // CSVエクスポート
    exportCSV() {
      // ファイル選択前にフォーマット説明を表示
      // confirm → OK なら選択に進む、キャンセルなら中止
      const eCproceed = confirm(this.t.CSVoutputInfo)
      if (!eCproceed) return

      const rows = this.todos.map(todo => {
        // カンマ・ダブルクォート・改行を含む値は "" で囲む
        const escape = val => {
          const str = String(val || '')
          return str.includes(',') || str.includes('"') || str.includes('\n')
            ? `"${str.replace(/"/g, '""')}"` // " は "" にエスケープ
            : str
        }
        return [
          escape(todo.text),
          escape(todo.category),
          escape(todo.dueDate),
          todo.done ? 'true' : 'false'
        ].join(',')
      })
      // \uFEFF → BOM（ExcelでCSVを開くときの文字化けを防ぐ）
      const csv = '\uFEFF' + rows.join('\n')
      this.downloadFile(csv, `todos-${this.getDateStamp()}.csv`, 'text/csv;charset=utf-8')
      this.showToast(this.t.toastExported)

    // ファイルが選択されたとき
    importFile(event) {
      const file = event.target.files[0]
      if (!file) return

      // 拡張子チェック：csv と json 以外はエラー
      if (!file.name.endsWith('.csv') && !file.name.endsWith('.json')) {
        this.showToast(this.t.toastImportError)
        event.target.value = ''
        return
      }

      // JSONはUTF-8固定で読み込む
      if (file.name.endsWith('.json')) {
        const reader = new FileReader()
        reader.onload = (e) => {
          try {
            this.importFromJSON(e.target.result)
          } catch (err) {
            this.showToast(this.t.toastImportError)
            console.log('取込エラー:', err)
          }
          event.target.value = ''
        }
        reader.readAsText(file, 'UTF-8')
        return
      }

      // CSVはまずバイナリで読んで文字コードを判定する
      const sniffer = new FileReader()
      sniffer.onload = (e) => {
        const bytes = new Uint8Array(e.target.result)

        // BOM付きUTF-8チェック（先頭3バイトが EF BB BF）
        const isUtf8Bom = bytes[0] === 0xEF && bytes[1] === 0xBB && bytes[2] === 0xBF

        // BOM付きUTF-8ならUTF-8、そうでなければShift-JISで読む
        const encoding = isUtf8Bom ? 'UTF-8' : 'Shift-JIS'

        const reader = new FileReader()
        reader.onload = (e2) => {
          try {
            this.importFromCSV(e2.target.result)
          } catch (err) {
            this.showToast(this.t.toastImportError)
            console.log('取込エラー:', err)
          }
          event.target.value = ''
        }
        reader.readAsText(file, encoding)
      }
      sniffer.readAsArrayBuffer(file)
    },

  // JSONから取り込む
    importFromJSON(content) {
      const raw = JSON.parse(content)
      if (!Array.isArray(raw)) throw new Error('配列ではありません')

      const data = raw
        .map(item => {
          // タスク：120文字で切る
          const taskText = (item.text || '').slice(0, 120)

          // カテゴリ：20文字で切る
          const category = (item.category || '').slice(0, 20)

          // 期日：normalizeDate → いろんな形式を yyyy-mm-dd に統一してくれる
          const dueDate = normalizeDate(item.dueDate || '')

          // 完了：true のみtrue、それ以外はfalse
          const done = item.done === true

          return { taskText, category, dueDate, done }
        })
        .filter(row => row.taskText.trim()) // タスクが空白の行はスキップ
        .map(row => ({
          id:        crypto.randomUUID(),
          text:      row.taskText,
          category:  row.category,
          dueDate:   row.dueDate,
          done:      row.done,
          createdAt: new Date().toISOString()
        }))

      this.applyImport(data)
    }, 

    // csvから取り込む
    importFromCSV(content) {
      const text = content.replace(/^\uFEFF/, '')
      const lines = text.split('\n').filter(line => line.trim())

      const data = lines
        .map(line => {
          const cols = parseCSVLine(line)

          // タスク：120文字で切る
          const taskText = (cols[0] || '').slice(0, 120)

          // カテゴリ：20文字で切る
          const category = (cols[1] || '').slice(0, 20)

          // 期日：yyyy-mm-dd形式チェック
          const rawDate = cols[2] || ''

          // normalizeDate → いろんな形式を yyyy-mm-dd に統一してくれる
          const dueDate = normalizeDate(cols[2] || '')

          // 完了：'true' のみtrue、それ以外はfalse
          const done = cols[3] === 'true'

          // タスクが空白なら null を返す（後でfilterで除く）
          if (!taskText.trim()) return null

          return {
            id:        crypto.randomUUID(),
            text:      taskText,
            category:  category,
            dueDate:   dueDate,
            done:      done,
            createdAt: new Date().toISOString()
          }
        })
        .filter(row => row !== null) // nullの行（タスクが空白）を除く

      this.applyImport(data)
    },
    
    // 取り込んだデータをtodosに反映する（上書きか追加かを選ぶ）
    applyImport(data) {
      // 1回目：上書きモードで取り込むか？
      const overwrite = confirm(this.t.importConfirmOverwrite)
      if (overwrite) {
        this.todos = data
        this.showToast(this.t.toastImported.replace('{count}', data.length))
        return
      }
      // 2回目：追加モードで取り込むか？
      const append = confirm(this.t.importConfirmAppend)
      if (append) {
        // [...既存, ...新しいデータ] → 配列を結合する（スプレッド構文）
        this.todos = [...this.todos, ...data]
        this.showToast(this.t.toastImported.replace('{count}', data.length))
        return
      }
      // どちらもキャンセル → 取込をやめる
      this.showToast(this.t.toastImportCancelled)
    },

            reg.update().then(() => {

    // 現在日時を "mmddHHMM" 形式で返す
    getDateStamp() {
    const now = new Date()
    const mm = String(now.getMonth() + 1).padStart(2, '0')  // 月
    const dd = String(now.getDate()).padStart(2, '0')       // 日
    const HH = String(now.getHours()).padStart(2, '0')      // 時
    const MM = String(now.getMinutes()).padStart(2, '0')    // 分
    return `${mm}${dd}${HH}${MM}`
  },

      // scrollRestoration に対応しているブラウザだけ設定する
      // （古いブラウザには存在しない機能なので確認してから設定する）
      history.scrollRestoration = 'manual'
    }

    const saved = localStorage.getItem('todos')
    try {
      if (saved) this.todos = JSON.parse(saved)
    } catch (e) {
      // データが壊れていたときは空にしてリセット
      console.log('保存データが読めなかったのでリセットしました:', e)
      this.todos = []
    }

    // $nextTick → Vueが画面を更新し終わったあとに実行する

    // ページ読み込み時に高さを測る
    this.$nextTick(() => {
      this.updateTopHeight()
    }) 

    // フォント読み込み完了後にも高さを測り直す
    // document.fonts.ready → 全フォントの読み込みが終わったら実行する
    document.fonts.ready.then(() => {
      this.updateTopHeight()
    })
    
    // 画面サイズが変わったとき（向き変更など）も高さを測り直す
    window.addEventListener('resize', () => {
      this.updateTopHeight()  
    })
  }

}) // createApp ここまで

// =============================================
// todo-card コンポーネント（タスク1件分の部品）
// 一覧モード・グループモード両方で使い回せる
// =============================================
app.component('todo-card', {

  // props：親（アプリ本体）から受け取るデータ
  props: [
    'todo',                   // 1件分のタスクデータ
    'editingId',              // 編集中のタスクのID
    't',                      // 翻訳テキスト一覧
    'formatDateFn',           // 日付フォーマット関数
    'filteredCategoriesEdit', // 編集時のカテゴリ候補
  ],

  // data：このコンポーネント自身が持つ変数
  data() {
    return {
      // カテゴリ入力欄にフォーカスしているか
      categoryFocused: false, 
    }
  },

  methods: {
  // 期日が今日より前かどうか判定する（期限切れ → タグを赤くする）
  isOverdue(dateStr) {
    if (!dateStr) return false
    const [y, m, d] = dateStr.split('-').map(Number)
    const due = new Date(y, m - 1, d)
    due.setHours(0, 0, 0, 0)
    const today = new Date()
    today.setHours(0, 0, 0, 0)
    return due < today
  },


  },

  template: `

      <div
        class="todo-card"
        :class="{
          editing: editingId === todo.id,      /* 編集中のときeditingクラスを付ける */
          overdue: isOverdue(todo.dueDate),    /* 期限切れのときoverdueクラスを付ける */
          done: todo.done                      /* 完了済みのときdoneクラスを付ける */
        }"
        @click="editingId !== todo.id && $emit('card-click', todo)"
      >
    
      <!-- editingId !== todo.id → 編集中でないときだけ card-click を発火する -->
      <!-- && → 左が true のときだけ右を実行する（短絡評価）-->
      <!-- つまり編集中のときは @click が何もしなくなる -->

      <!-- 通常表示（編集中でないとき） -->
      <div v-if="editingId !== todo.id" class="card-row">
        <div class="card-left">

          <!-- チェックボックス：.stop でカードのクリックに伝わらないようにする -->
          <input 
            type="checkbox"
            class="cb"
            v-model="todo.done"
            @click.stop
          >

          <!-- タスクテキスト＋タグ（横並び・折り返しあり） -->
          <div class="todo-text-area">
            <div class="todo-main-text" :class="{ done: todo.done }">
              {{ todo.text }}
            </div>
            <div class="todo-tags">
              <span v-if="todo.category" class="tag tag-category">{{ todo.category }}</span>
              <span
                v-if="todo.dueDate"
                class="tag tag-date"
                :class="{ overdue: isOverdue(todo.dueDate) }"
              >{{ formatDateFn(todo.dueDate) }}</span>
            </div>
          </div>
        </div>

        <!-- 編集・削除・コピーボタン -->
        <div class="card-right">

          <!-- 編集ボタン：edit_square アイコン -->
          <!-- @click.stop → クリックがカード全体に伝わらないように止める -->
          <!-- 編集ボタン -->
          <button type="button" @click.stop="$emit('edit', todo)" title="編集">
            <span class="material-symbols-outlined" translate="no">edit_square</span>
          </button>

          <!-- 削除ボタン -->
          <button type="button" class="delete-btn" @click.stop="$emit('delete', todo)" title="削除">
            <span class="material-symbols-outlined" translate="no">delete</span>
          </button>

          <!-- コピーして作成ボタン -->
            <button type="button" class="copy-btn" @click.stop="$emit('clone', todo)">
            <span class="material-symbols-outlined" translate="no">content_copy</span>
          </button>

        </div>
       </div>

      <!-- 編集モード（編集中のとき） -->
      <div v-else class="edit-inputs" @click.stop>

        <!-- タスク入力欄 最大文字数120-->
        <!-- todo.text.slice(0, 120) WinIMEコンポジションバグ対策 120文字制限が聞かない時用の対策-->
        <textarea
          v-model="todo.text"
          :placeholder="t.placeholderTodo"
          maxlength="120"
          rows="1"
          @input="todo.text = todo.text.slice(0, 120)"
          class="todo-textarea"
        ></textarea>

        <!-- カテゴリ入力欄：フォーカス中かつ候補があるとき青枠で一体化 最大文字数20-->
        <!-- todo.category.slice(0, 20) WinIMEコンポジションバグ対策 20文字制限が聞かない時用の対策-->
        <input
          v-model="todo.category"
          :placeholder="t.placeholderCategory"
          maxlength="20"
          :class="{ 'category-input-active': categoryFocused && filteredCategoriesEdit && filteredCategoriesEdit.length > 0 }"
          @input="todo.category = todo.category.slice(0, 20)"
          @focus="categoryFocused = true"
          @blur="setTimeout(() => { categoryFocused = false }, 200)"
        >

        <!-- カテゴリ候補：フォーカス中かつ候補があるときだけ表示 -->
        <template v-if="categoryFocused && filteredCategoriesEdit && filteredCategoriesEdit.length > 0">
          <div class="category-dropdown-label">{{ t.categorySuggestions }}</div>
          <div class="category-dropdown">
            <div
              v-for="cat in filteredCategoriesEdit"
              :key="cat"
              class="category-option"
              @click.stop="todo.category = cat"
            >▸ {{ cat }}</div>
          </div>
        </template>

        <!-- 期日入力欄 -->
        <div class="date-row">
          <span class="date-label">{{ t.datePlaceholder }}</span>
          <input type="date" v-model="todo.dueDate">
        </div>

        <!-- 更新・キャンセル・削除ボタン・コピーボタン（横並び） -->
        <div class="btn-row">

          <!-- 更新ボタン：save アイコン＋テキスト -->
          <button type="button" class="save-btn" @click="$emit('save')">
            <span class="material-symbols-outlined" translate="no">save</span>
            {{ t.save }}
          </button>

          <!-- 戻るボタン：undo アイコン＋テキスト -->
          <button type="button" class="cancel-btn" @click="$emit('cancel')">
            <span class="material-symbols-outlined" translate="no">cancel</span>
            {{ t.cancel }}
          </button>

          <!-- 削除ボタン：delete アイコン＋テキスト -->
          <button type="button" class="delete-btn" @click="$emit('delete', todo)">
            <span class="material-symbols-outlined" translate="no">delete</span>
            {{ t.delete }}
          </button>

          <!-- コピーボタン：content_copy アイコン＋テキスト -->
          <button type="button" class="copy-btn" @click="$emit('clone', todo)">
            <span class="material-symbols-outlined" translate="no">content_copy</span>
            Copy
          </button>

        </div>

      </div>
    </div>
  `
}) // todo-card ここまで

// アプリを「id="app"」の要素に表示する
app.mount('#app')

</script>
<script src="qororie-plugin.js"></script>
</body>
</html>
