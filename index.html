<!DOCTYPE html>
<html lang="ja">
<head>

  <!-- =============================================
    文字コードの設定
  ============================================= -->
  <meta charset="UTF-8">

  <!-- =============================================
    PWA（ホーム画面に追加できるアプリ化）のために
    Service Worker を登録する
    Service Worker → ブラウザの裏側で動く番人
    オフラインでも動くようにキャッシュを管理する
  ============================================= -->
  <script>
    // Service Worker に対応しているブラウザかどうか確認する
    // 古いブラウザには serviceWorker がないので確認してから使う
    if ('serviceWorker' in navigator) {
      // ページが読み込まれたあとに登録する
      // （ページ表示を妨げないようにloadイベントの後に実行）
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(() => {
            console.log('Service Worker 登録成功！')
          })
          .catch(err => {
            console.log('Service Worker 登録失敗:', err)
          })
      })
    }
  </script>

  <!-- =============================================
    画面の表示サイズを設定する
    width=device-width    → 画面の幅をデバイスの幅に合わせる
    initial-scale=1.0     → 最初のズーム倍率を1倍（等倍）にする
    minimum-scale=1.0     → 最小ズーム倍率（Androidの一部で必要）
    maximum-scale=1.0     → 最大ズーム倍率（Androidの一部で必要）
  ============================================= -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0">

  <title>QsToDo</title>

  <!-- ファビコン -->
  <link rel="icon" href="icon.svg" type="image/svg+xml" />

  <!-- =============================================
    PWA設定ファイルの読み込み
    manifest.json → アプリ名・アイコン・色などを定義したファイル
  ============================================= -->
  <link rel="manifest" href="./manifest.json">

  <!-- =============================================
    iOSのホーム画面追加用の設定
    Androidは manifest.json だけで対応できるが
    iOSは追加で apple- から始まるメタタグが必要
  ============================================= -->
  <!-- iOSでブラウザのUIを隠してアプリっぽく動かす -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <!-- 新しい標準の書き方（AndroidのChromeも対応） -->
  <meta name="mobile-web-app-capable" content="yes">
  <!-- ステータスバー（時計や電池が表示される部分）の色 -->
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <!-- ホーム画面のアイコン下に表示される名前 -->
  <meta name="apple-mobile-web-app-title" content="ToDo">
  <!-- iOSのホーム画面アイコン -->
  <link rel="apple-touch-icon" href="./icon.png">

  <!-- =============================================
    Material Symbols フォントの読み込み
  ============================================= -->
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
  />

  <style>

    /* =============================================
       Material Symbolsアイコンの基本スタイル
    ============================================= */
    .material-symbols-outlined {
      font-size: 20px;         /* アイコンのサイズ */
      vertical-align: middle;  /* テキストと上下中央を揃える */
      line-height: 1;
      user-select: none;       /* アイコン文字がテキスト選択されないようにする */
      /* font-variation-settings → アイコンの見た目を細かく制御する */
      font-variation-settings:
        "FILL" 1,    /* 0 = アウトライン（線のみ）, 1 = 塗りつぶし */
        "wght" 700,  /* 太さ（100〜700） */
        "GRAD" 10,    /* グラデーション */
        "opsz" 20;   /* 最適表示サイズ */
    }

    /* =============================================
       配色の定義（CSS変数）
    ============================================= */
    :root {
      --a: #F23A30;  /* 赤（削除・期限切れ・アクセント） */
      --b: #FAFAFA;  /* 白に近い（ボタン背景など） */
      --d: #56a09b;  /* 青緑（コピーボタン・期日タグ） */
      --e: #71752B;  /* 濃い緑（メインカラー・枠線） */
      --f: #191919;  /* ほぼ黒（テキスト） */
      --g: #F5F2E4;  /* クリーム（背景・カード） */
    }

    /* =============================================
       リセット・基本設定
       すべての要素に適用される基本スタイル
    ============================================= */

    /* box-sizing: border-box → paddingやborderが幅に含まれるようにする */
    /* 例：width:100px + padding:10px → 合計100px（はみ出さない） */
    * { box-sizing: border-box; }

    /* bodyのデフォルト余白をなくし、背景色を設定 */
    body { background: var(--g); margin: 0; }

    /* =============================================
       メインコンテナ
       padding-top は Vueで動的に変えるので
       CSSでは設定しない（0にしておく）
    ============================================= */
    .container {
      max-width: 1000px;       /* 最大幅*/
      margin: 0 auto;          /* 左右中央寄せ */
      padding: 0 16px 90px;   /* 上0・左右16px・下90px（フッター分） */
      font-family: sans-serif; /* ゴシック体フォント */
    }

    /* =============================================
       上部固定エリア
       position: fixed でスクロールしても常に上に固定される
    ============================================= */
    .top-fixed {
      position: fixed;              /* 画面に固定 */
      top: 0;                       /* 画面の一番上に */
      left: 50%;                    /* 左端を中央に */
      transform: translateX(-50%);  /* 中央寄せ（leftと組み合わせて使う） */
      width: 100%;                  /* 横幅いっぱい */
      max-width: 1000px;            /* 最大幅（containerと合わせる） */
      background: var(--g);         /* 背景色 */
      padding: 12px 16px 8px;       /* 内側の余白 */
      border-bottom: 2px solid var(--e); /* 下線 */
      backdrop-filter: blur(8px);   /* 背景をうっすらぼかす */
      z-index: 100;                 /* 他の要素より手前に表示 */
    }

    /* 言語切替と入出力ボタンを1行に並べる */
    .top-actions {
      display: flex;              /* 横並び */
      justify-content: space-between; /* 左右に広げる */
      align-items: center;        /* 上下中央 */
      margin-bottom: 8px;
    }

    /* 更新・言語切替ボタンエリア（左側） */
    .lang-switch { display: flex; gap: 8px; }

    /* 入出力ボタンエリア（右側） */
    .io-bar { display: flex; gap: 8px; }

    /* 更新ボタンのアイコンサイズ */
    .reload-icon {
      width: 16px;
      height: 16px;
      display: block;
    }

    /* 言語・入出力ボタン共通スタイル */
    .lang-switch button,
    .io-btn {
      background: transparent;     /* 背景なし（透明） */
      color: var(--e);
      border: 1px solid var(--e);
      padding: 3px 8px;
      border-radius: 10px;
      font-size: 11px;
      cursor: pointer;             /* マウスを乗せると指マークに */
    }

    /* 取込ボタンを囲っているlabelのスタイル
       ファイル選択画面がブラウザセキュリティで
       出ないことがある問題の対策としてlabelを使用 */
    .io-import-label {
      cursor: pointer;
      /* io-btnと同じ見た目になるよう別途クラスを付けている */
    }

    /* スマホ（430px以下）のときだけボタンを小さくする */
    /* 430px = iPhone 14 Pro Max の画面幅。これ以下をスマホと判断する */
    @media (max-width: 430px) {
      .lang-switch button,
      .io-btn,
      .io-import-label {
        padding: 3px 4px;   /* 左右の余白を最小限に */
        font-size: 10px;    /* 文字も少し小さく */
      }
      /* ボタン間隔も詰める */
      .lang-switch { gap: 4px; }
      .io-bar { gap: 4px; }
    }

    /* ホバー時（マウスを乗せたとき） */
    .lang-switch button:hover,
    .io-btn:hover { color: var(--f); border-color: var(--f); }

    /* 言語選択中のボタン（activeクラスが付いているとき） */
    .lang-switch button.active {
      background: var(--e);  /* 背景を濃い緑に */
      color: var(--g);       /* 文字をクリームに */
      border-color: var(--e);
    }

    /* 検索欄と＋ボタンを横に並べる行 */
    .top-row {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 4px;
    }

    /* 検索入力欄 */
    .search-input {
      flex: 1;              /* 残りの横幅を全部使う */
      padding: 10px 12px;
      border: 1px solid var(--e);
      border-radius: 10px;
      font-size: 15px;
      background: var(--g);
      outline: none;        /* フォーカス時のデフォルト枠をなくす */
    }
    /* 検索中（文字が入力されているとき） */
    .search-input.searching {
      border-color: var(--e);
      background: var(--g);
    }
    .search-input:focus { border-color: var(--f); }
    .search-input.searching:focus { border-color: var(--e); }

    /* ＋と×を切り替えるボタン */
    .toggle-btn {
      width: 42px;
      height: 42px;
      border-radius: 10px;
      border: none;
      background: var(--a);
      color: var(--g);
      font-size: 20px;
      cursor: pointer;
      flex-shrink: 0;  /* 幅が狭くても縮まないようにする */
      padding: 0;
    }
    /* フォームが開いているとき（openクラスが付く） */
    .toggle-btn.open { background: var(--e); }

    /* 件数表示（検索中のときだけ表示） */
    .search-status {
      font-size: 11px;
      color: var(--a);  /* 赤文字 */
      margin-bottom: 4px;
      padding-left: 2px;
    }

    /* =============================================
       タスク追加フォーム
       ＋ボタンを押したときだけ表示される
    ============================================= */
    .input-area {
      background: #fff;
      border: 1px solid var(--e);
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 12px;
      display: flex;
      flex-direction: column;  /* 子要素を縦並びにする */
      gap: 8px;                /* 子要素の間隔 */
    }

    /* 期日ラベルと入力欄を横並びにする */
    .date-row { display: flex; align-items: center; gap: 8px; }
    .date-label { font-size: 13px; color: var(--e); flex-shrink: 0; }
    .date-row input { flex: 1; width: auto; }

    /* カテゴリ候補のドロップダウン（入力欄の下に表示） */
    /* フォーカス中に入力欄と一体化するよう枠線を調整 */
    .category-input-active {
      border-color: var(--e) !important;
      border-bottom-left-radius: 0 !important;   /* 下の角を直角にする */
      border-bottom-right-radius: 0 !important;
      border-bottom: none !important;             /* 下の枠線をなくす */
    }
    .category-dropdown-label {
      font-size: 11px;
      color: var(--f);
      padding: 5px 12px 4px;
      background: var(--g);
      border: 1px solid var(--e);
    }
    .category-dropdown {
      background: var(--g); 
      border: 1px solid var(--e);
      border-top: none;
      border-bottom-left-radius: 10px;
      border-bottom-right-radius: 10px;
      overflow: hidden;
      margin-bottom: 4px;
    }
    .category-option {
      padding: 10px 12px;
      font-size: 14px;
      cursor: pointer;
      border-bottom: 1px solid var(--e);
      color: var(--e);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .category-option:last-child { border-bottom: none; }
    .category-option:hover { background: var(--g); }

    /* =============================================
       ボタン・入力欄の共通スタイル
    ============================================= */

    /* タスク入力欄（textarea） */
    .todo-textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--e);
      border-radius: 10px;
      font-size: 15px;
      background: var(--b);
      outline: none;
      resize: vertical;        /* 縦方向だけリサイズ可能（iPhoneでは効かない） */
      font-family: sans-serif; /* フォントをページと合わせる */
      min-height: 44px;        /* 最小の高さ */
      line-height: 1.5;
    }
    .todo-textarea:focus { border-color: var(--f); }

    /* テキスト入力欄（チェックボックス以外のinput） */
    /* :not([type="checkbox"]) → チェックボックスには適用しない */
    input:not([type="checkbox"]) {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--e);
      border-radius: 10px;
      font-size: 15px;
      background: var(--b);
      outline: none;
    }
    input:focus { border-color: var(--f); }

    /* チェックボックスのチェックマークの色 */
    /* accent-color → チェックボックスやラジオボタンの色を変える */
    .cb { accent-color: var(--a); }

    /* ボタンの共通スタイル */
    button {
      padding: 10px 16px;
      border: 1px solid var(--e);
      border-radius: 10px;
      font-size: 13px;
      cursor: pointer;
      color: var(--f);
      background-color: var(--b);
      min-height: 28px;
      min-width: 28px;
      max-width: 120px;
    }
    /* タップしたとき少し透明になる（押した感を出す） */
    button:active { opacity: 0.7; }

    /* ボタンを横並びにする共通クラス */
    .btn-row {
      display: flex;
      gap: 8px;
      justify-content: center; /* 中央寄せ */
    }
    .btn-row button {
      flex: 1;                  /* 均等な幅に広げる */
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;   /* アイコン上・テキスト下 */
      gap: 2px;
      padding: 6px 4px;
      font-size: 11px;
      max-width: 120px;         /* PCで広がりすぎない */
    }

    /* btn-row 内のアイコンサイズ */
    .btn-row .material-symbols-outlined { font-size: 20px; }

    /* 色別ボタン（!importantで他のスタイルより優先） */
    .cancel-btn { color: var(--e) !important; }  /* 戻るボタン（緑文字） */
    .delete-btn { color: var(--a) !important; }  /* 削除ボタン（赤文字） */
    .copy-btn   { color: var(--d) !important; }  /* コピーボタン（青緑文字） */

    /* 追加ボタン：一番重要なので目立たせる */
    .add-btn {
      flex: 2;               /* 戻るボタンの2倍の幅 */
      background: var(--e);  /* 濃い緑背景 */
      color: var(--b);       /* 白文字 */
      border-color: var(--e);
    }

    /* 追加フォームの戻るボタン */
    .cancel-add-btn {
      flex: 1;
      background: var(--g);  /* クリーム背景 */
      color: var(--e);
      border-color: var(--e);
    }

    /* =============================================
       ToDoカード
    ============================================= */

    /* 通常のカード */
    .todo-card {
      background: var(--g);
      border: 1px solid var(--e);
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 8px;
      cursor: pointer;  /* カードをタップで編集モードに入る */
    }
    /* 期限切れのカード（overdueクラスが付く） */
    .todo-card.overdue { border-color: var(--a); }
    /* 完了済みのカード（doneクラスが付く） */
    .todo-card.done {
      border-color: var(--e);
      opacity: 0.4;  /* 薄くして目立たせない */
    }
    /* 編集中のカード（editingクラスが付く） */
    .todo-card.editing {
      border: 1px solid var(--e);
      cursor: default;  /* 編集中はタップしても何もしない */
    }

    /* カード内の横並びレイアウト */
    .card-row {
      display: flex;
      align-items: flex-start;  /* 上揃え */
      gap: 8px;
    }

    /* カード左側（チェックボックス＋テキスト） */
    .card-left {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      flex: 1;      /* 残りの幅を全部使う */
      min-width: 0; /* テキストが長くてもはみ出さないようにする */
    }

    /* カード右側（編集・削除・コピーボタン） */
    .card-right {
      display: flex;
      gap: 4px;
      flex-shrink: 0;  /* 幅が狭くても縮まないようにする */
    }

    /* カード右側のボタン共通 */
    .card-right button {
      padding: 4px 6px;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;  /* 背景なし */
      color: var(--g);          /* デフォルトはクリーム色（見えない） */
    }
    /* 1番目のボタン（編集ボタン）だけ色を変える */
    .card-right button:first-child { color: var(--f); }

    /* カード右側のアイコンサイズ */
    .card-right .material-symbols-outlined { font-size: 14px; }

    /* タスクのテキスト＋タグエリア（横並び・折り返しあり） */
    .todo-text-area {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-wrap: wrap;   /* 幅が足りないとき折り返す */
      align-items: center;
      gap: 8px;
    }

    /* タスクのメインテキスト */
    .todo-main-text {
      font-size: 15px;
      color: var(--f);
      word-break: break-word;  /* 長い単語も折り返す */
      line-height: 1.4;
    }
    /* 完了したタスクは打ち消し線＋緑文字 */
    .todo-main-text.done {
      text-decoration: line-through;
      color: var(--e);
    }
    /* 期限切れのカードのテキストは赤文字 */
    .todo-card.overdue .todo-main-text { color: var(--a); }
    /* 期限切れ＋完了済みは完了の色（緑）を優先 */
    .todo-card.overdue.done .todo-main-text { color: var(--e); }

    /* カテゴリ・期日のタグエリア */
    .todo-tags {
      font-size: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-left: 6px;
    }

    /* タグの共通スタイル */
    .tag {
      display: inline-block;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
    }
    .tag-category { background: var(--e); color: var(--g); }  /* カテゴリタグ（緑） */
    .tag-date     { background: var(--d); color: var(--g); }  /* 期日タグ（青緑） */
    .tag-date.overdue { background: var(--a); color: var(--g); }  /* 期限切れ期日タグ（赤） */

    /* =============================================
       編集モード
    ============================================= */

    /* 編集モードの縦並びレイアウト */
    .edit-inputs {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* 編集モードのボタン（アイコン上・テキスト下） */
    .edit-inputs .btn-row button {
      flex-direction: column;
      gap: 2px;
      padding: 6px 4px;
      font-size: 10px;
    }

    /* 編集モードのアイコンサイズ */
    .edit-inputs .btn-row .material-symbols-outlined { font-size: 20px; }

    /* 編集モードのチェックボックス行 */
    .edit-check-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 0;
    }
    /* 完了・未完了のラベルテキスト */
    .edit-check-label {
      font-size: 13px;
      color: var(--e);
    }

    /* 編集モードのアイコンラベル付き入力欄
       アイコン + 入力欄を横並びにする */
    .edit-label-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    /* ラベルのアイコン */
    .edit-label-row .material-symbols-outlined {
      font-size: 18px;
      color: var(--e);
      flex-shrink: 0;  /* アイコンが縮まないようにする */
    }
    /* 入力欄を横いっぱいに広げる */
    .edit-label-row input,
    .edit-label-row textarea {
      flex: 1;
      width: auto;  /* flexで広げるのでwidthはautoに */
    }

    /* 更新ボタン（編集モードの1番目のボタン） */
    .edit-inputs .btn-row button:first-child {
      flex: 2;               /* 他のボタンより広く */
      background: var(--e);  
      color: var(--b);
      border-color: var(--e);
    }
    /* 戻るボタン */
    .edit-inputs .btn-row .cancel-btn {
      flex: 1.5;
      background: var(--g);
      color: var(--e);
      border-color: var(--e);
    }
    /* 削除ボタン */
    .edit-inputs .btn-row .delete-btn {
      flex: 1.5;
      background: var(--g);
      color: var(--a);
      border-color: var(--a);
    }
    /* コピーボタン（補助機能なので小さめ） */
    .edit-inputs .btn-row .copy-btn {
      flex: 1;
      background: var(--g);
      color: var(--d);
      border-color: var(--d);
    }

    /* =============================================
       カード追加・削除のフェードアニメーション
       Vueの <transition-group> 機能で使う
       クラス名は Vue が自動で付けてくれる
    ============================================= */
    .todo-fade-enter-active { transition: opacity 0.3s; }  /* 追加時：0.3秒でふわっと出る */
    .todo-fade-leave-active { transition: opacity 0.3s; }  /* 削除時：0.3秒でふわっと消える */

    ============================================= */
    .group-header {

    ============================================= */

      color: var(--e);

// VueからcreateAppを取り出す
const { createApp } = Vue

// =============================================
// CSV1行をパースする（分解する）関数
// "値1","値,2",値3 のようなCSVを正しく分割する
// "" で囲まれた値の中のカンマは区切りとして扱わない
// createAppより先に定義しておく（importFromCSVから呼ばれるため）
// =============================================
function parseCSVLine(line) {
  const result = []
  let current = ''
  let inQuotes = false  // 今 "" の中にいるかどうか

  for (let i = 0; i < line.length; i++) {
    const char = line[i]
    if (char === '"') {
      // "" は " 1文字として扱う（エスケープ）
      if (inQuotes && line[i + 1] === '"') {
        current += '"'
        i++
      } else {
        inQuotes = !inQuotes  // "" の中/外を切り替える
      }
    } else if (char === ',' && !inQuotes) {
      // クォートの外のカンマだけ区切りとして扱う
      result.push(current)
      current = ''
    } else {
      current += char
    }
  }
  result.push(current)
  return result
}

// =============================================
// 様々な日付形式を yyyy-mm-dd に統一する関数
// Excelで開くと日付形式が変わることがあるので
// いろんな形式に対応できるようにしている
//
// 対応形式：
//   yyyy-mm-dd （元の形式）
//   yyyy/m/d, yyyy/mm/dd
//   m/d/yyyy   （英語Excel）
//   yyyy年m月d日
// =============================================
function normalizeDate(str) {
  if (!str || !str.trim()) return ''
  const s = str.trim()

  // すでに yyyy-mm-dd 形式ならそのまま返す
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s

  let y, m, d

  // スラッシュで分割して年月日を判定する
  const slashParts = s.split('/')

  // yyyy/m/d または yyyy/mm/dd（先頭が4桁 = 年）
  if (slashParts.length === 3 && slashParts[0].length === 4) {
    y = parseInt(slashParts[0])
    m = parseInt(slashParts[1])
    d = parseInt(slashParts[2])
  }
  // m/d/yyyy（末尾が4桁 = 英語Excel形式）
  else if (slashParts.length === 3 && slashParts[2].length === 4) {
    m = parseInt(slashParts[0])
    d = parseInt(slashParts[1])
    y = parseInt(slashParts[2])
  }
  // yyyy年m月d日（漢字形式）
  else {
    const kanji = s.replace('年', '/').replace('月', '/').replace('日', '').split('/')
    if (kanji.length === 3 && kanji[0].length === 4) {
      y = parseInt(kanji[0])
      m = parseInt(kanji[1])
      d = parseInt(kanji[2])
    }
  }

  // 年月日が取れなかったら空文字を返す
  if (!y || !m || !d) return ''

  // 日付として有効かチェック（例：2月30日などを弾く）
  const date = new Date(y, m - 1, d)
  if (
    date.getFullYear() !== y ||
    date.getMonth() + 1 !== m ||
    date.getDate() !== d
  ) return ''

  // yyyy-mm-dd 形式に整える（月・日は2桁にする）
  // padStart(2, '0') → 1桁の数字を '01' のように2桁にする
  return `${y}-${String(m).padStart(2, '0')}-${String(d).padStart(2, '0')}`
}

          saveError:              'Could not save',
          importConfirmOverwrite: 'Import in overwrite mode?\n\n[Note]\nExisting tasks will be deleted.',
          importConfirmAppend:    'Import in append mode?\n\n[Note]\nTasks will be added to existing ones.\n\nCancel → Cancel import',
          CSVoutputInfo:
            'Do you want to output the file as CSV?(todos-mmddHHMM.csv)\n\n' +
            '[CSV Column Order]\n' +
            'Task (max 120), Category (max 20), Due date (yyyy-mm-dd), Done (true/false)',
          JSONoutputInfo: 'Do you want to output it as JSON?(todos-mmddHHMM.json)',
          importFormatInfo:
            '[Import Format]\n' +
            'CSV or JSON files are supported\n\n' +
            '[CSV Column Order]\n' +
            'Task (max 120), Category (max 20), Due date (yyyy-mm-dd), Done (true/false)\n\n' +
            '[Notes]\n' +
            '・Rows with empty task will be skipped\n' +
            '・Invalid date format will be treated as empty\n' +
            '・Values other than true/false will be treated as false\n\n' +
            'Press OK to select a file',
        }
      },

      // 上部固定エリアの高さ（Vueで動的に更新される）
      topHeight: 120,

      // 追加フォームの入力値
      newTodo:   '',
      category:  '',
      dueDate:   '',

      // タスクの一覧（すべてのデータはここに入る）
      todos: [],

      // 検索欄のテキスト
      searchText: '',

      // 編集中のタスクのID（編集していないときはnull）
      editingId: null,

      // 編集キャンセル用のバックアップ（元のデータを保存しておく）
      editingBackup: null,

      // グループ表示の種類（'none' / 'category' / 'dueDate'）
      groupBy: 'none',

      // 現在開いているグループの名前一覧（[]のとき全部閉じている）
      openGroups: [],

      // 追加フォームの表示・非表示
      showInput: false,

      // 追加フォームのカテゴリ欄にフォーカスしているか
      categoryFocused: false,

      // トーストに表示するメッセージ（空のとき非表示）
      toastMessage: '',

      // トーストがフェードアウト中かどうか
      toastHiding: false,
    }
  },

  // ── computed：dataを加工して返す算出プロパティ ──
  // 依存しているdataが変わると自動で再計算される
  computed: {

    // 現在の言語のテキストセットを返す
    // this.t.add のように使える
    t() { return this.translations[this.currentLang] },

    // 登録済みカテゴリの一覧（重複なし）
    // Set → 重複を自動で除いてくれるJavaScriptの仕組み
    allCategories() {
      const cats = this.todos.map(t => t.category).filter(c => c && c.trim())
      return [...new Set(cats)]
    },

    // 追加フォームのカテゴリ候補
    // 空欄のときは全候補、入力中は部分一致で絞り込む
    filteredCategories() {
      if (!this.category.trim()) return this.allCategories
      const q = this.category.toLowerCase()
      return this.allCategories.filter(cat =>
        cat.toLowerCase().includes(q) && cat !== this.category
      )
    },

    // 編集フォームのカテゴリ候補
    filteredCategoriesEdit() {
      if (this.editingId === null) return []
      const todo = this.todos.find(t => t.id === this.editingId)
      if (!todo) return []
      if (!todo.category.trim()) return this.allCategories
      const q = todo.category.toLowerCase()
      return this.allCategories.filter(cat =>
        cat.toLowerCase().includes(q) && cat !== todo.category
      )
    },

    // 検索フィルター（searchTextが変わるたびに自動再計算）
    filteredTodos() {
      const q = this.toHankaku(this.searchText.toLowerCase().trim())
      if (!q) return this.todos
      // 「今日」「来週」などの日付キーワードで検索
      const deadline = this.parseDeadline(q)
      if (deadline) {
        return this.todos.filter(todo => this.isBeforeDeadline(todo.dueDate, deadline))
      }
      // テキスト・カテゴリで検索
      return this.todos.filter(todo => {
        const text = this.toHankaku(todo.text.toLowerCase())
        const cat  = this.toHankaku((todo.category || '').toLowerCase())
        return text.includes(q) || cat.includes(q)
      })
    },

    // 一覧モード専用：filteredTodosを新しい順に並べたもの
    sortedTodos() {
      return this.filteredTodos.slice().sort((a, b) =>
        a.createdAt > b.createdAt ? -1 : 1  // 新しい順
      )
    },

    // グループ化されたタスク一覧
    groupedTodos() {
      const todos = this.filteredTodos
      if (this.groupBy === 'category') {
        const map = {}
        todos.forEach(todo => {
          const key = todo.category || this.t.noCategory
          if (!map[key]) map[key] = []
          map[key].push(todo)
        })
        return Object.keys(map)
          .map(label => ({ label, todos: map[label] }))
          .sort((a, b) => {
            if (a.label === this.t.noCategory) return 1
            if (b.label === this.t.noCategory) return -1
            return a.label.localeCompare(b.label)
          })
          // グループ内を「期日が近い順 → 登録が古い順」に並べる
          .map(group => ({
            label: group.label,
            todos: group.todos.slice().sort((a, b) => {
              const aDate = a.dueDate || '9999-99-99'
              const bDate = b.dueDate || '9999-99-99'
              if (aDate !== bDate) return aDate > bDate ? 1 : -1
              return a.createdAt > b.createdAt ? 1 : -1
            })
          }))
      }
      if (this.groupBy === 'dueDate') {
        const map = {}
        todos.forEach(todo => {
          const key = todo.dueDate ? this.formatDate(todo.dueDate) : this.t.noDate
          if (!map[key]) map[key] = []
          map[key].push(todo)
        })
        return Object.keys(map)
          .map(label => ({ label, todos: map[label] }))
          .sort((a, b) => {
            if (a.label === this.t.noDate) return 1
            if (b.label === this.t.noDate) return -1
            return a.todos[0].dueDate > b.todos[0].dueDate ? 1 : -1
          })
          // グループ内を「カテゴリ名前順 → 登録が古い順」に並べる
          .map(group => ({
            label: group.label,
            todos: group.todos.slice().sort((a, b) => {
              // 'ｿ' は五十音の最後のほうの文字（カテゴリなしを一番後ろにする）
              const aCat = a.category || 'ｿ'
              const bCat = b.category || 'ｿ'
              if (aCat !== bCat) return aCat.localeCompare(bCat)
              return a.createdAt > b.createdAt ? 1 : -1
            })
          }))
      }
      return []
    }
  },

  // ── methods：ボタンを押したときなどの処理 ──
  methods: {

    // 上部固定エリアの高さを測って topHeight を更新する
    // getBoundingClientRect().height → 要素の実際の高さを取得する
    updateTopHeight() {
      const topEl = document.querySelector('.top-fixed')
      if (topEl) {
        this.topHeight = topEl.getBoundingClientRect().height
      }
    },

    // ── フォーム関連 ──

    // 追加フォームを開く
    openInput() {
      this.cancelEditIfNeeded()
      // 検索欄に文字があればタスク欄にコピーする
      if (this.searchText.trim()) this.newTodo = this.searchText
      this.showInput = true
      // 一番上にスクロールしてフォームを見えるようにする
      window.scrollTo({ top: 0, behavior: 'smooth' })
    },

    // 追加フォームを閉じて入力欄をリセット
    closeInput() {
      this.showInput = false
      this.newTodo = ''
      this.category = ''
      this.dueDate = ''
      this.categoryFocused = false
    },

    // 検索欄でEnterを押したとき追加フォームを開く
    onSearchEnter() {
      if (!this.showInput) this.openInput()
    },

    // 編集中なら先にキャンセルする
    cancelEditIfNeeded() {
      if (this.editingId !== null) this.cancelEdit()
    },

    // カテゴリ候補をタップしたとき入力欄に反映する
    selectCategory(cat) { this.category = cat },

    // ── タスク操作 ──

    // タスクを追加する
    addTodo() {
      if (!this.newTodo.trim()) return
      this.todos.push({
        // crypto.randomUUID() → 重複しないIDを生成する
        id:        crypto.randomUUID(),
        text:      this.newTodo,
        category:  this.category,
        dueDate:   this.dueDate,
        done:      false,
        createdAt: new Date().toISOString()  // ISO形式の日時文字列
      })
      this.showToast(this.t.toastAdded, this.newTodo)
      this.searchText = ''  // 検索欄をクリアして全件表示に戻す
      this.closeInput()
    },

    // タスクを削除する
    deleteTodo(todo) {
      const DELETEproceed = confirm(this.t.deleteInfo)
      if (!DELETEproceed) return

      // cancelEditIfNeeded()は「元に戻す」処理も走るので削除時には使わない
      // バックアップをそっと捨てるだけにする
      this.editingId = null
      this.editingBackup = null

      // トーストを先に表示（削除後だとtodo.textが取れないため）
      this.showToast(this.t.toastDeleted, todo.text)
      // filter → 削除するタスク以外だけ残す
      this.todos = this.todos.filter(t => t.id !== todo.id)
    },

    // 編集モードを開始する
    startEdit(todo) {
      if (this.showInput) this.closeInput()
      if (this.editingId !== null) this.cancelEdit()
      // キャンセル用にデータをコピーして保存しておく
      // { ...todo } → スプレッド構文でオブジェクトをコピーする
      this.editingBackup = { ...todo }
      this.editingId = todo.id
      // 今のスクロール位置を保存しておく（チェックボックスで戻るとき用）
      this._savedScrollY = window.scrollY
    },

    // 編集を保存する
    finishEdit() {
      const todo = this.todos.find(t => t.id === this.editingId)
      // テキストが空なら元に戻す
      if (todo && !todo.text.trim()) {
        this.cancelEdit()
        return
      }
      this.showToast(this.t.toastUpdated, todo.text)
      this.editingId = null
      this.editingBackup = null
      // 保存したスクロール位置に戻す
      // behavior: 'instant' → アニメーションなしで瞬間移動
      this.$nextTick(() => {
        window.scrollTo({ top: this._savedScrollY || 0, behavior: 'instant' })
      })
    },

    // 編集をキャンセルして元のデータに戻す
    cancelEdit() {
      if (this.editingBackup !== null) {
        const index = this.todos.findIndex(t => t.id === this.editingBackup.id)
        // splice(index, 1, 新データ) → index番目を1件削除して新データを入れる
        if (index !== -1) this.todos.splice(index, 1, { ...this.editingBackup })
      }
      this.editingId = null
      this.editingBackup = null
    },

    // ── グループ・コピー ──

    // グループを開閉する
    toggleGroup(label) {
      const i = this.openGroups.indexOf(label)
      // indexOf → 見つからないとき -1 を返す
      if (i === -1) this.openGroups.push(label)  // 開く
      else this.openGroups.splice(i, 1)           // 閉じる
    },

    // タスクをコピーして追加フォームを開く
    // テキスト・カテゴリのみコピー（期日はリセット）
    copyTodo(todo) {
      const COPYproceed = confirm(this.t.copyInfo)
      if (!COPYproceed) return

      this.cancelEditIfNeeded()
      this.newTodo   = todo.text
      this.category  = todo.category
      this.dueDate   = ''
      this.showInput = true

      // $nextTick → Vueが画面の更新を終えてからスクロールする
      this.$nextTick(() => {
        window.scrollTo({ top: 0, behavior: 'smooth' })
      })
    },

    // ── 通知・表示 ──

    // トーストを表示する
    // message: 翻訳テキスト（{name}がタスク名に置き換わる）
    // name: タスク名（省略すると空文字）
    showToast(message, name = '') {
      const text = message.replace('{name}', name)
      this.toastMessage = text
      this.toastHiding = false
      // 2秒後にフェードアウト開始
      setTimeout(() => {
        this.toastHiding = true
        // フェードアウト（0.4秒）が終わったらメッセージを消す
        setTimeout(() => {
          this.toastMessage = ''
          this.toastHiding = false
        }, 400)
      }, 2000)
    },

    // "2025-04-01" → "4/1(火)" に変換する
    formatDate(dateStr) {
      if (!dateStr) return ''
      const [y, m, d] = dateStr.split('-').map(Number)
      const date = new Date(y, m - 1, d)
      const ja = ['日','月','火','水','木','金','土']
      const en = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat']
      const days = this.currentLang === 'ja' ? ja : en
      return `${m}/${d}(${days[date.getDay()]})`
    },

    // 全角英数字を半角に変換する（検索用）
    // 例：「Ａ」→「A」 「１」→「1」
    toHankaku(str) {
      return str.replace(/[Ａ-Ｚａ-ｚ０-９]/g, c =>
        String.fromCharCode(c.charCodeAt(0) - 65248)
      )
    },

    // ── 検索 ──

    // 検索欄に「今日」「来週」などと入力したとき
    // 締切日として解釈して期日フィルターをかける
    parseDeadline(q) {
      const today = new Date()
      today.setHours(0, 0, 0, 0)
      const nextSunday = w => {
        const d = today.getDay()
        const diff = d === 0 ? 7 : 7 - d
        const r = new Date(today)
        r.setDate(today.getDate() + diff + w * 7)
        return r
      }
      const monthEnd = n => new Date(today.getFullYear(), today.getMonth() + 1 + n, 0)
      const youbiMap = {
        '日':0,'月':1,'火':2,'水':3,'木':4,'金':5,'土':6,
        '日曜':0,'月曜':1,'火曜':2,'水曜':3,'木曜':4,'金曜':5,'土曜':6,
        '日曜日':0,'月曜日':1,'火曜日':2,'水曜日':3,'木曜日':4,'金曜日':5,'土曜日':6,
        'sun':0,'mon':1,'tue':2,'wed':3,'thu':4,'fri':5,'sat':6,
        'sunday':0,'monday':1,'tuesday':2,'wednesday':3,
        'thursday':4,'friday':5,'saturday':6
      }
      const specificMonthMap = {
        '1月':1,'2月':2,'3月':3,'4月':4,'5月':5,'6月':6,
        '7月':7,'8月':8,'9月':9,'10月':10,'11月':11,'12月':12,
        'jan':1,'feb':2,'mar':3,'apr':4,'may':5,'jun':6,
        'jul':7,'aug':8,'sep':9,'oct':10,'nov':11,'dec':12,
        'january':1,'february':2,'march':3,'april':4,
        'june':6,'july':7,'august':8,'september':9,
        'october':10,'november':11,'december':12
      }
      const relDayMap = {
        '今日':0,'today':0,'明日':1,'あした':1,'tomorrow':1,
        '明後日':2,'あさって':2,'day after tomorrow':2
      }
      const relWeekMap = {
        '今週':nextSunday(0),'this week':nextSunday(0),
        '来週':nextSunday(1),'next week':nextSunday(1),
        '再来週':nextSunday(2),'week after next':nextSunday(2)
      }
      const relMonthMap = {
        '今月':monthEnd(0),'this month':monthEnd(0),
        '来月':monthEnd(1),'next month':monthEnd(1),
        '再来月':monthEnd(2),'month after next':monthEnd(2)
      }
      if (q in relDayMap) {
        const r = new Date(today)
        r.setDate(today.getDate() + relDayMap[q])
        return r
      }
      if (q in relWeekMap) return relWeekMap[q]
      if (q in relMonthMap) return relMonthMap[q]
      if (q in youbiMap) {
        const diff = ((youbiMap[q] - today.getDay()) + 7) % 7 || 7
        const r = new Date(today)
        r.setDate(today.getDate() + diff)
        return r
      }
      if (q in specificMonthMap) {
        const m = specificMonthMap[q]
        const y = m < today.getMonth() + 1 ? today.getFullYear() + 1 : today.getFullYear()
        return new Date(y, m, 0)
      }
      const sm = q.match(/^(\d{1,2})\/$/)
      if (sm) {
        const m = parseInt(sm[1])
        if (m >= 1 && m <= 12) {
          const y = m < today.getMonth() + 1 ? today.getFullYear() + 1 : today.getFullYear()
          return new Date(y, m, 0)
        }
      }
      return null
    },

    // 期日が締切日以内かどうか判定する
    isBeforeDeadline(dueDate, deadline) {
      if (!dueDate) return true  // 期日なしは常にtrueで表示する
      const [y, m, d] = dueDate.split('-').map(Number)
      const due = new Date(y, m - 1, d)
      due.setHours(0, 0, 0, 0)
      return due <= deadline
    },

    // ── ファイル入出力 ──

    // ファイルをダウンロードさせる共通関数
    // content: ファイルの中身（文字列）
    // filename: 保存するファイル名
    // type: ファイルの種類（MIMEタイプ）
    downloadFile(content, filename, type) {
      // Blob → データのかたまりを作る
      const blob = new Blob([content], { type })
      // URL.createObjectURL → Blobに一時的なURLを割り当てる
      const url = URL.createObjectURL(blob)
      // 見えないリンクを作って自動クリックでダウンロード
      const a = document.createElement('a')
      a.href = url
      a.download = filename
      a.click()
      // 使い終わったURLを解放する（メモリの掃除）
      URL.revokeObjectURL(url)
    },

    // 現在日時を "mmddHHMM" 形式で返す（ファイル名に使う）
    // 例：4月23日14時30分 → "04231430"
    getDateStamp() {
      const now = new Date()
      const mm = String(now.getMonth() + 1).padStart(2, '0')  // 月（2桁）
      const dd = String(now.getDate()).padStart(2, '0')        // 日（2桁）
      const HH = String(now.getHours()).padStart(2, '0')       // 時（2桁）
      const MM = String(now.getMinutes()).padStart(2, '0')     // 分（2桁）
      return `${mm}${dd}${HH}${MM}`
    },

    // CSVエクスポート
    exportCSV() {
      const eCproceed = confirm(this.t.CSVoutputInfo)
      if (!eCproceed) return

      const rows = this.todos.map(todo => {
        // カンマ・ダブルクォート・改行を含む値は "" で囲む
        const escape = val => {
          const str = String(val || '')
          return str.includes(',') || str.includes('"') || str.includes('\n')
            ? `"${str.replace(/"/g, '""')}"` // " は "" にエスケープ
            : str
        }
        return [
          escape(todo.text),
          escape(todo.category),
          escape(todo.dueDate),
          todo.done ? 'true' : 'false'
        ].join(',')
      })
      // \uFEFF → BOM（ExcelでCSVを開くときの文字化けを防ぐ）
      const csv = '\uFEFF' + rows.join('\n')
      this.downloadFile(csv, `todos-${this.getDateStamp()}.csv`, 'text/csv;charset=utf-8')
      this.showToast(this.t.toastExported)
    },

    // JSONエクスポート
    exportJSON() {
      const eJproceed = confirm(this.t.JSONoutputInfo)
      if (!eJproceed) return
      // JSON.stringify(データ, null, 2) → インデント付きのJSON文字列に変換
      const json = JSON.stringify(this.todos, null, 2)
      this.downloadFile(json, `todos-${this.getDateStamp()}.json`, 'application/json')
      this.showToast(this.t.toastExported)
    },

    // ？ボタン：フォーマット説明をalertで表示するだけ
    showImportInfo() {
      alert(this.t.importFormatInfo)
    },

    // ファイルが選択されたとき
    importFile(event) {
      const file = event.target.files[0]
      if (!file) return

      // 拡張子チェック：csv と json 以外はエラー
      if (!file.name.endsWith('.csv') && !file.name.endsWith('.json')) {
        this.showToast(this.t.toastImportError)
        event.target.value = ''
        return
      }

      // JSONはUTF-8固定で読み込む
      if (file.name.endsWith('.json')) {
        const reader = new FileReader()
        reader.onload = (e) => {
          try {
            this.importFromJSON(e.target.result)
          } catch (err) {
            this.showToast(this.t.toastImportError)
            console.log('取込エラー:', err)
          }
          event.target.value = ''
        }
        reader.readAsText(file, 'UTF-8')
        return
      }

      // CSVはまずバイナリで読んで文字コードを自動判定する
      const sniffer = new FileReader()
      sniffer.onload = (e) => {
        const bytes = new Uint8Array(e.target.result)
        // BOM付きUTF-8チェック（先頭3バイトが EF BB BF）
        const isUtf8Bom = bytes[0] === 0xEF && bytes[1] === 0xBB && bytes[2] === 0xBF
        // BOM付きUTF-8ならUTF-8、そうでなければShift-JIS（Excel日本語環境）で読む
        const encoding = isUtf8Bom ? 'UTF-8' : 'Shift-JIS'

        const reader = new FileReader()
        reader.onload = (e2) => {
          try {
            this.importFromCSV(e2.target.result)
          } catch (err) {
            this.showToast(this.t.toastImportError)
            console.log('取込エラー:', err)
          }
          event.target.value = ''
        }
        reader.readAsText(file, encoding)
      }
      sniffer.readAsArrayBuffer(file)
    },

    // JSONから取り込む
    importFromJSON(content) {
      const raw = JSON.parse(content)
      if (!Array.isArray(raw)) throw new Error('配列ではありません')

      const data = raw
        .map(item => {
          const taskText = (item.text || '').slice(0, 120)       // 最大120文字
          const category = (item.category || '').slice(0, 20)   // 最大20文字
          const dueDate  = normalizeDate(item.dueDate || '')     // 日付形式を統一
          const done     = item.done === true                     // true のみtrue
          return { taskText, category, dueDate, done }
        })
        .filter(row => row.taskText.trim())  // タスクが空白の行はスキップ
        .map(row => ({
          id:        crypto.randomUUID(),
          text:      row.taskText,
          category:  row.category,
          dueDate:   row.dueDate,
          done:      row.done,
          createdAt: new Date().toISOString()
        }))

      this.applyImport(data)
    },

    // CSVから取り込む
    importFromCSV(content) {
      // BOM（\uFEFF）を取り除く
      const text = content.replace(/^\uFEFF/, '')
      const lines = text.split('\n').filter(line => line.trim())

      const data = lines
        .map(line => {
          const cols = parseCSVLine(line)
          const taskText = (cols[0] || '').slice(0, 120)   // 最大120文字
          const category = (cols[1] || '').slice(0, 20)    // 最大20文字
          const dueDate  = normalizeDate(cols[2] || '')    // 日付形式を統一
          const done     = cols[3] === 'true'               // 'true' のみtrue

          // タスクが空白なら null を返す（後でfilterで除く）
          if (!taskText.trim()) return null

          return {
            id:        crypto.randomUUID(),
            text:      taskText,
            category:  category,
            dueDate:   dueDate,
            done:      done,
            createdAt: new Date().toISOString()
          }
        })
        .filter(row => row !== null)  // null（空白行）を除く

      this.applyImport(data)
    },

    // 取り込んだデータをtodosに反映する（上書きか追加かを選ぶ）
    applyImport(data) {
      const overwrite = confirm(this.t.importConfirmOverwrite)
      if (overwrite) {
        this.todos = data
        this.showToast(this.t.toastImported.replace('{count}', data.length))
        return
      }
      const append = confirm(this.t.importConfirmAppend)
      if (append) {
        // スプレッド構文で配列を結合する
        this.todos = [...this.todos, ...data]
        this.showToast(this.t.toastImported.replace('{count}', data.length))
        return
      }
      this.showToast(this.t.toastImportCancelled)
    },

    // ── アプリ更新 ──

    // アプリを強制的に最新版に更新する
    // Service Workerに新しいバージョンがあれば適用してリロードする
    reloadApp() {
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistration().then(reg => {
          if (reg) {
            reg.update().then(() => {
              window.location.reload()
            })
          } else {
            window.location.reload()
          }
        })
      } else {
        window.location.reload()
      }
    },

  },  // methods ここまで

  // ── watch：dataの変化を監視する ──
  watch: {

    // todosが変わったら自動でlocalStorageに保存する
    // deep: true → 配列の中身の変化も検知する
    todos: {
      deep: true,
      handler() {
        try {
          // JSON.stringify → JavaScriptのオブジェクトをJSON文字列に変換する
          localStorage.setItem('todos', JSON.stringify(this.todos))
        } catch (e) {
          // プライベートブラウジングや容量オーバーのときはここに来る
          console.log(this.t.saveError, e)
          this.showToast(this.t.saveError)
        }
      }
    },

    // グループ表示が切り替わったとき
    groupBy(newVal) {
      if (newVal === 'none') {
        this.openGroups = []  // 一覧モードはグループなし
      }
      // グループモードは全部閉じた状態で開始
      // （openGroupsは [] のままにしておく）

      // 表示切替のたびに一番上にスクロールする
      window.scrollTo({ top: 0, behavior: 'smooth' })
    },

    // フォームの開閉で上部の高さが変わるので測り直す
    showInput() {
      this.$nextTick(() => { this.updateTopHeight() })
    },

  },  // watch ここまで

  // ── mounted：ページが読み込まれたとき1回だけ実行される ──
  mounted() {

    // ブラウザのスクロール位置の自動復元をオフにする
    // 'manual' → 「自分でスクロール位置を管理する」
    // 'auto'   → ブラウザが自動で復元する（デフォルト）
    if ('scrollRestoration' in history) {
      history.scrollRestoration = 'manual'
    }

    // localStorageから保存済みタスクを読み込む
    const saved = localStorage.getItem('todos')
    try {
      if (saved) this.todos = JSON.parse(saved)
    } catch (e) {
      // データが壊れていたときは空にしてリセット
      console.log('保存データが読めなかったのでリセットしました:', e)
      this.todos = []
    }

    // $nextTick → Vueが画面を更新し終わったあとに実行する
    this.$nextTick(() => {
      this.updateTopHeight()  // ページ読み込み時に高さを測る
    })

    // document.fonts.ready → 全フォントの読み込みが終わったら実行する
    // フォント読み込み後にヘッダーの高さが変わることがあるので再計測
    document.fonts.ready.then(() => {
      this.updateTopHeight()
    })

    // 画面サイズが変わったとき（向き変更など）も高さを測り直す
    window.addEventListener('resize', () => {
      this.updateTopHeight()
    })

  }  // mounted ここまで

}) // createApp ここまで


// =============================================
// todo-card コンポーネント（タスク1件分の部品）
// 一覧モード・グループモード両方で使い回せる
// =============================================
app.component('todo-card', {

  // props：親（アプリ本体）から受け取るデータ
  props: [
    'todo',                   // 1件分のタスクデータ
    'editingId',              // 編集中のタスクのID
    't',                      // 翻訳テキスト一覧
    'formatDateFn',           // 日付フォーマット関数（親から渡す）
    'filteredCategoriesEdit', // 編集時のカテゴリ候補
  ],

  // data：このコンポーネント自身が持つ変数
  data() {
    return {
      // カテゴリ入力欄にフォーカスしているか
      categoryFocused: false,
    }
  },

  methods: {
    // 期日が今日より前かどうか判定する（期限切れ → タグを赤くする）
    isOverdue(dateStr) {
      if (!dateStr) return false
      const [y, m, d] = dateStr.split('-').map(Number)
      const due = new Date(y, m - 1, d)
      due.setHours(0, 0, 0, 0)
      const today = new Date()
      today.setHours(0, 0, 0, 0)
      return due < today
    },
  },

  template: `
    <div
      class="todo-card"
      :class="{
        editing: editingId === todo.id,
        overdue: isOverdue(todo.dueDate) && !todo.done,
        done: todo.done
      }"
      @click="editingId !== todo.id && $emit('card-click', todo)"
    >
      <!-- 通常表示（編集中でないとき） -->
      <div v-if="editingId !== todo.id" class="card-row">
        <div class="card-left">

          <!-- チェックボックス：.stop でカードのクリックに伝わらないようにする -->
          <input
            type="checkbox"
            class="cb"
            v-model="todo.done"
            @click.stop
          >

          <!-- タスクテキスト＋タグ -->
          <div class="todo-text-area">
            <div class="todo-main-text" :class="{ done: todo.done }">
              {{ todo.text }}
            </div>
            <div class="todo-tags">
              <span v-if="todo.category" class="tag tag-category">{{ todo.category }}</span>
              <span
                v-if="todo.dueDate"
                class="tag tag-date"
                :class="{ overdue: isOverdue(todo.dueDate) }"
              >{{ formatDateFn(todo.dueDate) }}</span>
            </div>
          </div>
        </div>

        <!-- 編集・削除・コピーボタン -->
        <div class="card-right">
          <button type="button" @click.stop="$emit('edit', todo)" title="編集">
            <span class="material-symbols-outlined" translate="no">edit_square</span>
          </button>
          <button type="button" class="delete-btn" @click.stop="$emit('delete', todo)" title="削除">
            <span class="material-symbols-outlined" translate="no">delete</span>
          </button>
          <button type="button" class="copy-btn" @click.stop="$emit('clone', todo)" title="コピー">
            <span class="material-symbols-outlined" translate="no">content_copy</span>
          </button>
        </div>
      </div>

      <!-- 編集モード（編集中のとき） -->
      <div v-else class="edit-inputs" @click.stop>

        <!-- チェックボックス：編集モードでも完了状態を変更できる -->
        <!-- @change → チェックが変わったとき保存して編集モードを閉じる -->
        <div class="edit-check-row">
          <input
            type="checkbox"
            class="cb"
            v-model="todo.done"
            @change="$emit('save')"
            @click.stop
          >
          <span class="edit-check-label">{{ todo.done ? t.done : t.notDone }}</span>
        </div>

        <!-- タスク入力欄：アイコンラベル付き（最大120文字） -->
        <!-- WinIMEコンポジションバグ対策：@inputでもスライスして制限 -->
        <div class="edit-label-row">
          <span class="material-symbols-outlined" translate="no">edit_note</span>
          <textarea
            v-model="todo.text"
            :placeholder="t.placeholderTodo"
            maxlength="120"
            rows="1"
            @input="todo.text = todo.text.slice(0, 120)"
            class="todo-textarea"
          ></textarea>
        </div>

        <!-- カテゴリ入力欄：アイコンラベル付き（最大20文字） -->
        <div class="edit-label-row">
          <span class="material-symbols-outlined" translate="no">label</span>
          <input
            v-model="todo.category"
            :placeholder="t.placeholderCategory"
            maxlength="20"
            :class="{ 'category-input-active': categoryFocused && filteredCategoriesEdit && filteredCategoriesEdit.length > 0 }"
            @input="todo.category = todo.category.slice(0, 20)"
            @focus="categoryFocused = true"
            @blur="setTimeout(() => { categoryFocused = false }, 200)"
          >
        </div>

        <!-- カテゴリ候補：フォーカス中かつ候補があるときだけ表示 -->
        <template v-if="categoryFocused && filteredCategoriesEdit && filteredCategoriesEdit.length > 0">
          <div class="category-dropdown-label">{{ t.categorySuggestions }}</div>
          <div class="category-dropdown">
            <div
              v-for="cat in filteredCategoriesEdit"
              :key="cat"
              class="category-option"
              @click.stop="todo.category = cat"
            >▸ {{ cat }}</div>
          </div>
        </template>

        <!-- 期日入力欄：アイコンラベル付き -->
        <div class="edit-label-row">
          <span class="material-symbols-outlined" translate="no">calendar_today</span>
          <input type="date" v-model="todo.dueDate">
        </div>

        <!-- 更新・戻る・削除・コピーボタン -->
        <div class="btn-row">
          <button type="button" @click="$emit('save')">
            <span class="material-symbols-outlined" translate="no">save</span>
            {{ t.save }}
          </button>
          <button type="button" class="cancel-btn" @click="$emit('cancel')">
            <span class="material-symbols-outlined" translate="no">cancel</span>
            {{ t.cancel }}
          </button>
          <button type="button" class="delete-btn" @click="$emit('delete', todo)">
            <span class="material-symbols-outlined" translate="no">delete</span>
            {{ t.delete }}
          </button>
          <button type="button" class="copy-btn" @click="$emit('clone', todo)">
            <span class="material-symbols-outlined" translate="no">content_copy</span>
            Copy
          </button>
        </div>

      </div>
    </div>
  `
}) // todo-card ここまで

// アプリを「id="app"」の要素に表示する
app.mount('#app')

</script>

<script src="qororie-plugin.js"></script>

</body>
